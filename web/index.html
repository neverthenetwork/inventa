<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Inventa — Network Topology</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Inventa agentic network observability — topology, SPF, BGP-LS">
</head>

<body>
  <header class="site-header">
    <button class="menu-toggle" id="menu_toggle" aria-label="Toggle sidebar" aria-expanded="false" aria-controls="sidebar">
      ☰
    </button>
    <span class="site-title">Inventa</span>
    <span class="site-badge">Topology</span>
  </header>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="control-group">
        <label class="control-label" for="include_patterns">Filter Patterns</label>
        <textarea id="include_patterns" rows="5" placeholder="One pattern per line..."></textarea>
      </div>

      <button type="button" class="btn" id="update_btn">Update Graph</button>

      <div class="control-group">
        <label class="control-label" for="src_select">Source</label>
        <div id="src_container"></div>
      </div>

      <div class="control-group">
        <label class="control-label" for="dst_select">Destination</label>
        <div id="dst_container"></div>
      </div>

      <div id="details_area"></div>
    </aside>

    <main class="graph-pane">
      <div id="cy"></div>
      <div class="status-bar" id="status_bar">
        <span id="status_text"></span>
        <span id="node_count"></span>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
