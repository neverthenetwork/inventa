# ── Inventa + Floci Demo Stack ──────────────────────────────────
# Canned demo: AWS topology visualization in one command.
#
#   docker compose up --build
#   open http://localhost:8081
#
# Floci auto-seeds a default VPC on startup. The seed service then
# creates a richer topology (EC2 instances, ALB, target group).
# Inventa discovers everything and renders the graph in the browser.

services:
  # Local AWS emulator — seeds default VPC resources on startup
  floci:
    image: floci/floci:latest
    environment:
      - FLOCI_DEFAULT_REGION=us-east-1
      - FLOCI_SERVICES_EC2_MOCK=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 1s

  # Seed demo topology — creates EC2 instances, ALB, etc. in Floci
  # Runs once, then exits. Inventa waits for it to complete.
  seed:
    image: floci/floci:latest-compat
    depends_on:
      floci:
        condition: service_healthy
    volumes:
      - ./demo/seed-topology.sh:/seed-topology.sh:ro
    entrypoint: ["/bin/sh", "/seed-topology.sh"]

  # Inventa — discovers AWS topology from Floci and serves the web UI
  inventa:
    build: .
    ports:
      - "8081:8081"
    volumes:
      - ./demo/config.yaml:/etc/inventa/config.yaml:ro
    depends_on:
      floci:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
